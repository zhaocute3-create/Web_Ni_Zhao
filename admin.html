<!DOCTYPE html>
<html>
<head>
<title>ZHAO ADMIN</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 background:#0b1220;
 color:#00ffcc;
 font-family:sans-serif;
 text-align:center;
}

.card{
 border:1px solid #00ffcc;
 margin:15px;
 padding:15px;
 border-radius:15px;
 box-shadow:0 0 20px #00ffcc33;
}

input,select,button{
 padding:10px;
 margin:5px;
 border-radius:10px;
 border:1px solid #00ffcc;
 background:#0b1220;
 color:#00ffcc;
}

button{
 cursor:pointer;
 box-shadow:0 0 10px #00ffcc;
 transition:0.3s;
}
button:hover{
 transform:scale(1.05);
 box-shadow:0 0 20px #00ffcc;
}

#toast{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:#00ffcc;
 color:black;
 padding:10px;
 border-radius:10px;
 opacity:0;
 transition:0.3s;
}
</style>
</head>

<body>

<h2>🔥 ZHAO ADMIN PANEL 🔥</h2>

<!-- 🔑 CREATE KEY -->
<div class="card">
<h3>🔑 Create Key</h3>

<input id="keyInput" placeholder="Enter Key">
<input id="coinsInput" type="number" placeholder="Coins">

<button onclick="createKey()">Create Key</button>
</div>

<!-- 📦 ADD STOCK -->
<div class="card">
<h3>📦 Add Stock</h3>

<select id="game">
  <option value="MLBB">MLBB</option>
  <option value="CODM">CODM</option>
  <option value="FreeFire">FreeFire</option>
</select>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<input id="price" type="number" placeholder="Price">

<input id="inactive" placeholder="Inactive days">
<input id="bind" placeholder="Bind">
<input type="file" id="imageFile" accept="image/*">
<img id="preview" width="120" style="display:none;margin-top:10px;">

<button onclick="addStock()">Add Stock</button>
</div>

<!-- 📊 STATS -->
<div class="card">
<h3>📊 Stats</h3>
<p id="totalStocks">Total Stocks: 0</p>
<p id="totalKeys">Total Keys: 0</p>
</div>

<!-- 📜 LOGS -->
<div class="card">
<h3>📜 Logs</h3>
<div id="logs"></div>
</div>

<p id="toast"></p>

<!-- 🔐 ADMIN SECURITY -->
<script type="module">
import { auth } from "./firebase.js";

auth.onAuthStateChanged(user=>{
  if(!user || user.email !== "jhonlouiebaid92@gmail.com"){
    document.body.innerHTML = "<h2 style='color:red;text-align:center;'>ACCESS DENIED</h2>";
  }
});
</script>

<script type="module" src="admin.js"></script>

</body>
</html>
